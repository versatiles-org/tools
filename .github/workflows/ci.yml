name: CI

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 6 * * 0' # Weekly on Sunday at 06:00 UTC
  pull_request:
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1: Lint, test, and validate (parallel)

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install node dependencies
        run: npm ci

      - name: Check Format
        run: npm run format:check

      - name: Check Lint
        run: npm run lint

      - name: Check Svelte
        run: npm run check:svelte

      - name: Run Tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Extract generated scripts
        run: npx tsx tests/integration/extract_code.ts

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate script syntax
        run: bash tests/integration/validate_syntax.sh

  # Phase 2: Smoke tests (needs check)

  smoke-test-linux:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 'Smoke test: script'
        run: npm run test:integration -- script

      - name: 'Smoke test: docker'
        run: npm run test:integration -- docker

      - name: 'Smoke test: docker_nginx'
        run: npm run test:integration -- docker_nginx

  smoke-test-macos:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 'Smoke test: homebrew'
        run: npm run test:integration -- homebrew

      - name: 'Smoke test: script'
        run: npm run test:integration -- script

  smoke-test-windows:
    needs: [check]
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 'Smoke test: script'
        run: npm run test:integration -- script

  # Phase 3: Build and deploy (needs all smoke tests)

  build:
    needs: [smoke-test-linux, smoke-test-macos, smoke-test-windows]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install node dependencies
        run: npm ci

      - name: Render Site
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
